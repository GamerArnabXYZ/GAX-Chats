name: 🔨 Debug APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🔍 Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🔨 Build Split Debug APK
        run: flutter build apk --debug --split-per-abi

      - name: 🏷️ Delete Old Release
        run: |
          gh release delete debug-latest --yes || true
          git push origin --delete debug-latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Create Release with Direct APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "🔨 Debug APK (Latest)"
          body: "Auto-built debug APK — direct download!"
          prerelease: true
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
