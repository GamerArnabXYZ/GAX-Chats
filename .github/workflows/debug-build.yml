name: 🔨 Debug APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🔍 Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🔨 Build Split Debug APK
        run: flutter build apk --debug --split-per-abi

      - name: 📤 Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 7
          compression-level: 0

      - name: 📤 Upload ARM32 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-arm32
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
          retention-days: 7
          compression-level: 0
