<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/GAX-Chats/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="GAX Chats — Fast. Secure. Yours. Real-time messaging by GamerArnabXYZ.">
  <meta name="theme-color" content="#7C5CFC">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>GAX Chats</title>

  <style>
    :root {
      --v:   #7C5CFC;
      --c:   #00D4FF;
      --p:   #B044FF;
      --d0:  #05050E;
      --d2:  #0C0D1E;
      --d3:  #111228;
      --d4:  #171933;
      --tx1: #F0F0FF;
      --tx2: #7878A8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--d0);
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ════════════════════════════════════
       LOADING SCREEN
    ════════════════════════════════════ */
    #gax-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--d0);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #gax-loader.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    .mesh {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(124,92,252,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,212,255,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 60% 20%, rgba(124,92,252,0.08) 0%, transparent 60%);
      animation: meshPulse 4s ease-in-out infinite alternate;
    }
    @keyframes meshPulse {
      from { opacity: 0.7; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.04); }
    }

    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at center, black 30%, transparent 100%);
    }

    .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatUp var(--dur) ease-in var(--delay) infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(0); }
      20%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
      80%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-120px) scale(0.5); }
    }

    .loader-content {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }

    /* Logo */
    .logo-wrap { position: relative; width: 100px; height: 100px; }
    .logo-ring {
      position: absolute; inset: -6px; border-radius: 50%;
      background: conic-gradient(from 0deg, #7C5CFC, #00D4FF, #B044FF, #7C5CFC);
      animation: spinRing 2.2s linear infinite;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));
      mask:         radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    .logo-box {
      position: absolute; inset: 0; border-radius: 28px;
      background: linear-gradient(135deg, #7C5CFC, #00D4FF);
      display: flex; align-items: center; justify-content: center;
      animation: logoPulse 2s ease-in-out infinite alternate; overflow: hidden;
    }
    @keyframes logoPulse {
      from { box-shadow: 0 0 30px rgba(124,92,252,0.4), 0 0 60px rgba(124,92,252,0.15); }
      to   { box-shadow: 0 0 50px rgba(124,92,252,0.7), 0 0 100px rgba(124,92,252,0.3); }
    }
    .logo-box img { width: 72px; height: 72px; object-fit: cover; border-radius: 22px; }
    .logo-bolt {
      font-size: 48px; line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      animation: boltPop 1.8s ease-in-out infinite alternate;
    }
    @keyframes boltPop {
      from { transform: scale(0.92); }
      to   { transform: scale(1.06); }
    }

    /* App name */
    .app-name {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      animation: fadeUp 0.8s ease 0.2s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .app-name h1 {
      font-size: 32px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #7C5CFC, #00D4FF, #B044FF);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    .app-name p { font-size: 13px; color: var(--tx2); letter-spacing: 0.3px; font-weight: 500; }

    /* Progress */
    .progress-wrap {
      width: 180px; display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: fadeUp 0.8s ease 0.4s both;
    }
    .progress-track { width: 100%; height: 3px; background: rgba(124,92,252,0.15); border-radius: 99px; overflow: hidden; }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7C5CFC, #00D4FF);
      border-radius: 99px; transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(124,92,252,0.8);
    }
    .progress-label { font-size: 11px; color: var(--tx2); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

    .bottom-tag {
      position: absolute; bottom: 32px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: rgba(120,120,168,0.5); letter-spacing: 0.5px;
      animation: fadeUp 1s ease 0.8s both;
    }

    /* ════════════════════════════════════
       APK DOWNLOAD BANNER
       fixed · no close · unclearable
    ════════════════════════════════════ */
    #apk-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8888;
      width: calc(100% - 32px);
      max-width: 420px;

      background: linear-gradient(135deg,
        rgba(17,18,40,0.97) 0%,
        rgba(12,13,30,0.97) 100%);
      border: 1px solid rgba(124,92,252,0.30);
      border-radius: 18px;
      padding: 13px 15px;

      display: flex;
      align-items: center;
      gap: 13px;

      box-shadow:
        0 8px 32px rgba(0,0,0,0.60),
        0 0 0 1px rgba(124,92,252,0.08),
        inset 0 1px 0 rgba(255,255,255,0.04);

      animation: bannerSlide 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.4s both;
      pointer-events: all;
    }

    @keyframes bannerSlide {
      from { opacity: 0; transform: translateX(-50%) translateY(50px) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1); }
    }

    /* Top shimmer line */
    #apk-banner::before {
      content: '';
      position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,92,252,0.55), rgba(0,212,255,0.35), transparent);
      border-radius: 99px;
    }

    /* APK icon */
    .apk-icon {
      flex-shrink: 0;
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg, #7C5CFC, #00D4FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(124,92,252,0.40);
      animation: iconFloat 3s ease-in-out infinite alternate;
    }
    @keyframes iconFloat {
      from { transform: translateY(0px); }
      to   { transform: translateY(-3px); }
    }

    /* Text */
    .apk-text { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .apk-text strong { font-size: 13px; font-weight: 700; color: var(--tx1); white-space: nowrap; }
    .apk-text span   { font-size: 10.5px; color: var(--tx2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Download button */
    .apk-btn {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: linear-gradient(135deg, #7C5CFC 0%, #5B3FD4 100%);
      border-radius: 11px;
      color: #fff;
      font-size: 12px; font-weight: 700; letter-spacing: 0.2px;
      text-decoration: none; white-space: nowrap;
      box-shadow: 0 4px 14px rgba(124,92,252,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative; overflow: hidden;
    }
    .apk-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent);
      border-radius: 11px;
    }
    .apk-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 22px rgba(124,92,252,0.65); }
    .apk-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(124,92,252,0.35); }

    .dl-icon { width: 13px; height: 13px; fill: none; stroke: #fff; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }

    /* Pulse ring on button — draws attention */
    .apk-btn-wrap { position: relative; flex-shrink: 0; }
    .apk-pulse {
      position: absolute; inset: -4px;
      border-radius: 15px;
      border: 1.5px solid rgba(124,92,252,0.5);
      animation: pulsRing 2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes pulsRing {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.18); }
    }
  </style>
</head>

<body>

  <!-- ══ LOADING SCREEN ═══════════════════════════ -->
  <div id="gax-loader">
    <div class="mesh"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="loader-content">
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-box">
          <img src="assets/logo.png" alt="GAX"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="logo-bolt" style="display:none">⚡</span>
        </div>
      </div>

      <div class="app-name">
        <h1>GAX Chats</h1>
        <p>Fast · Secure · Yours</p>
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="progress-label" id="progress-label">Loading…</span>
      </div>
    </div>

    <div class="bottom-tag">Built by GamerArnabXYZ · ArnabLabZ Studio</div>
  </div>

  <!-- ══ APK BANNER — no close button ════════════ -->
  <div id="apk-banner">
    <div class="apk-icon">📲</div>
    <div class="apk-text">
      <strong>Get the Android App</strong>
      <span>Faster · Native · No browser needed</span>
    </div>
    <div class="apk-btn-wrap">
      <div class="apk-pulse"></div>
      <a class="apk-btn"
         href="https://github.com/GamerArnabXYZ/GAX-Chats/releases/latest"
         target="_blank"
         rel="noopener noreferrer">
        <svg class="dl-icon" viewBox="0 0 14 14">
          <line x1="7" y1="1" x2="7" y2="9"/>
          <polyline points="3.5,6 7,9.5 10.5,6"/>
          <line x1="1" y1="12" x2="13" y2="12"/>
        </svg>
        Download APK
      </a>
    </div>
  </div>

  <script>
    // Particles
    (function() {
      const c = document.getElementById('particles');
      const clrs = ['#7C5CFC','#00D4FF','#B044FF','#00E5A0'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const s = Math.random() * 4 + 2;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;background:${clrs[Math.floor(Math.random()*clrs.length)]};--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;box-shadow:0 0 ${s*3}px ${clrs[Math.floor(Math.random()*clrs.length)]};`;
        c.appendChild(p);
      }
    })();

    // Progress steps
    const bar = document.getElementById('progress-bar');
    const lbl = document.getElementById('progress-label');
    const steps = [
      {pct:15, txt:'Initializing…'},
      {pct:35, txt:'Loading Firebase…'},
      {pct:60, txt:'Setting up…'},
      {pct:80, txt:'Almost ready…'},
      {pct:95, txt:'Starting app…'},
    ];
    let si = 0;
    const tick = setInterval(() => {
      if (si < steps.length) { bar.style.width = steps[si].pct+'%'; lbl.textContent = steps[si].txt; si++; }
      else clearInterval(tick);
    }, 600);

    // Flutter ready event
    window.addEventListener('flutter-first-frame', () => {
      clearInterval(tick);
      bar.style.width = '100%';
      lbl.textContent = 'Ready!';
      setTimeout(() => document.getElementById('gax-loader').classList.add('hidden'), 350);
    });

    // Fallback 12s
    setTimeout(() => document.getElementById('gax-loader').classList.add('hidden'), 12000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
