<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080916"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>GAX Chats</title>
<style>
/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#080916;color:#F0F0FF;}
button,input,textarea{font-family:inherit;font-size:inherit;border:none;outline:none;background:none;}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:0;height:0;}

/* ════════════════════════════════════════════
   CSS VARIABLES — GAX Design Tokens
════════════════════════════════════════════ */
:root{
  /* Dark palette */
  --d0:#05050E; --d1:#080916; --d2:#0C0D1E; --d3:#111228;
  --d4:#171933; --d5:#1F2142; --d6:#262950;
  /* Light palette */
  --l0:#F7F7FF; --l1:#FFFFFF; --l2:#EEEEFB; --l3:#E4E4F6; --l4:#D8D8F0;
  /* Brand */
  --violet:#7C5CFC; --cyan:#00D4FF; --indigo:#4535CC;
  --mint:#00E5A0; --rose:#FF4D80; --amber:#FFB340;
  /* State */
  --live:#2EFF9A; --read-clr:#00D4FF; --err:#FF4D80;
  /* Bubble dark */
  --sent-d:#1A1650; --recv-d:#0F1024;
  /* Bubble light */
  --sent-l:#EDE8FF; --recv-l:#FFFFFF;
  /* Text dark */
  --tx1:#F0F0FF; --tx2:#7878A8; --tx3:#3C3D62;
  /* Text light */
  --tx1l:#080916; --tx2l:#5A5A88; --tx3l:#9090C0;
  /* Dividers */
  --div-d:#141630; --div-l:#DDDDF4;
  /* Active theme (dark default) */
  --bg:var(--d1); --surf:var(--d3); --fill:var(--d4);
  --tx:var(--tx1); --tx-s:var(--tx2); --divider:var(--div-d);
  --nav-bg:var(--d2); --app-bar:var(--d3);
  --sent-bg:var(--sent-d); --recv-bg:var(--recv-d);
  --input-bg:var(--d4); --card-bg:var(--d3);
  --pfp-bg:var(--d3); --btn-txt:#FFF;
  --gBrand:linear-gradient(135deg,#7C5CFC,#00D4FF);
  --gBrand2:linear-gradient(135deg,#7C5CFC,#B044FF);
  --trans:all .2s cubic-bezier(.4,0,.2,1);
}
body.light{
  --bg:var(--l0); --surf:var(--l1); --fill:var(--l2);
  --tx:var(--tx1l); --tx-s:var(--tx2l); --divider:var(--div-l);
  --nav-bg:#FFF; --app-bar:var(--violet);
  --sent-bg:var(--sent-l); --recv-bg:var(--recv-l);
  --input-bg:var(--l2); --card-bg:#FFF;
  --pfp-bg:var(--l2);
}

/* ════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;display:flex;flex-direction:column;
  background:var(--bg);transition:background .3s;
  max-width:480px;margin:0 auto;
  box-shadow:0 0 60px rgba(0,0,0,.5);
}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;z-index:1;}
.screen.hidden{transform:translateX(100%);pointer-events:none;}
.screen.slide-in{animation:slideIn .28s cubic-bezier(.4,0,.2,1) forwards;}
.screen.slide-out{animation:slideOut .28s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideOut{from{transform:translateX(0)}to{transform:translateX(100%)}}

/* ════════════════════════════════════════════
   APPBAR
════════════════════════════════════════════ */
.app-bar{
  background:var(--app-bar);padding:0 8px;
  display:flex;align-items:center;gap:4px;min-height:56px;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;position:relative;z-index:10;
}
.app-bar .back-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;color:#FFF;flex-shrink:0;
  transition:var(--trans);
}
.app-bar .back-btn:active{background:rgba(255,255,255,.15);}
.app-bar .title-wrap{flex:1;display:flex;align-items:center;gap:10px;overflow:hidden;}
.app-bar .bar-title{color:#FFF;font-size:17px;font-weight:800;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-bar .bar-sub{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px;}
.app-bar .bar-actions{display:flex;gap:2px;flex-shrink:0;}
.app-bar .icon-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;color:#FFF;
  transition:var(--trans);
}
.app-bar .icon-btn:active{background:rgba(255,255,255,.15);}
.app-bar svg{width:22px;height:22px;fill:currentColor;}

/* Main screen has logo */
.app-bar.main-bar{gap:10px;}
.app-bar .gax-logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--gBrand);display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#FFF;letter-spacing:-1px;flex-shrink:0;
  box-shadow:0 0 16px rgba(124,92,252,.4);
}

/* ════════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════════ */
.bottom-nav{
  background:var(--nav-bg);display:flex;flex-shrink:0;
  border-top:1px solid var(--divider);
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 8px;cursor:pointer;gap:4px;
  transition:var(--trans);position:relative;
}
.nav-item svg{width:24px;height:24px;transition:var(--trans);}
.nav-item span{font-size:10px;font-weight:600;letter-spacing:.2px;transition:var(--trans);}
.nav-item .nav-icon{color:var(--tx-s);}
.nav-item span{color:var(--tx-s);}
.nav-item.active .nav-icon{color:var(--violet);}
.nav-item.active span{color:var(--violet);}
.nav-item .badge{
  position:absolute;top:6px;left:50%;margin-left:4px;
  background:var(--violet);color:#FFF;font-size:9px;font-weight:800;
  padding:1px 5px;border-radius:99px;min-width:16px;text-align:center;
}

/* ════════════════════════════════════════════
   TABS BODY
════════════════════════════════════════════ */
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tab-content.active{display:flex;}

/* ════════════════════════════════════════════
   SCROLLABLE LIST
════════════════════════════════════════════ */
.scroll-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll-list::-webkit-scrollbar{display:none;}

/* ════════════════════════════════════════════
   CONVERSATION ROW
════════════════════════════════════════════ */
.conv-row{
  display:flex;align-items:center;gap:13px;padding:11px 16px;
  cursor:pointer;border-bottom:1px solid var(--divider);
  transition:background .15s;position:relative;
  background:var(--bg);
}
.conv-row:active{background:var(--fill);}
.conv-row.unread{background:rgba(124,92,252,.05);}
.conv-row .avi-wrap{position:relative;flex-shrink:0;}
.avi{
  width:52px;height:52px;border-radius:50%;background:var(--pfp-bg);
  object-fit:cover;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:var(--violet);
  flex-shrink:0;
}
.avi img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.online-dot{
  position:absolute;bottom:1px;right:1px;
  width:13px;height:13px;border-radius:50%;
  background:var(--live);border:2.5px solid var(--bg);
}
.online-dot.offline{background:var(--tx3);}
.conv-info{flex:1;min-width:0;}
.conv-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.conv-name{font-size:15px;font-weight:700;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-name.bold{font-weight:800;}
.conv-time{font-size:11px;color:var(--tx-s);flex-shrink:0;}
.conv-time.unread-time{color:var(--violet);font-weight:700;}
.conv-bottom{display:flex;align-items:center;gap:4px;}
.conv-preview{font-size:13px;color:var(--tx-s);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-preview.bold{font-weight:600;color:var(--tx);}
.unread-badge{
  background:var(--gBrand);color:#FFF;font-size:10px;font-weight:800;
  padding:2px 6px;border-radius:99px;flex-shrink:0;
  box-shadow:0 0 8px rgba(124,92,252,.4);
}
.tick{color:var(--tx-s);font-size:13px;}
.tick.read{color:var(--cyan);}
.typing-dots{display:flex;gap:3px;align-items:center;}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--cyan);
  display:inline-block;animation:bounce .9s infinite ease-in-out;
}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.typing-text{font-size:12px;color:var(--cyan);font-style:italic;margin-left:5px;}

/* ════════════════════════════════════════════
   EMPTY STATE
════════════════════════════════════════════ */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:32px;
}
.empty-icon-box{
  width:72px;height:72px;border-radius:22px;
  background:var(--gBrand2);display:flex;align-items:center;justify-content:center;
  font-size:32px;box-shadow:0 0 24px rgba(124,92,252,.35);
}
.empty-title{font-size:20px;font-weight:800;color:var(--tx);}
.empty-sub{font-size:13.5px;color:var(--tx-s);text-align:center;}

/* ════════════════════════════════════════════
   FIND TAB
════════════════════════════════════════════ */
.search-bar-wrap{
  background:var(--surf);padding:10px 14px;border-bottom:1px solid var(--divider);
  flex-shrink:0;
}
.search-bar{
  background:var(--fill);border-radius:14px;display:flex;align-items:center;
  gap:8px;padding:0 12px;height:46px;
  border:1px solid transparent;transition:border-color .2s;
}
.search-bar.focused{border-color:rgba(124,92,252,.4);}
.search-bar input{
  flex:1;background:none;color:var(--tx);font-size:15px;
  caret-color:var(--violet);
}
.search-bar input::placeholder{color:var(--tx-s);}
.search-icon{color:var(--tx-s);display:flex;}
.search-icon.active{color:var(--violet);}
.clear-btn{color:var(--tx-s);cursor:pointer;display:flex;}

/* ════════════════════════════════════════════
   CONTACT ROW
════════════════════════════════════════════ */
.contact-row{
  display:flex;align-items:center;gap:13px;padding:11px 16px;
  border-bottom:1px solid var(--divider);
  transition:background .15s;
}
.contact-row:active{background:var(--fill);}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:15px;font-weight:700;color:var(--tx);}
.contact-user{font-size:12.5px;color:var(--tx-s);}
.contact-bio{font-size:12px;color:var(--tx-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip-btn{
  padding:7px 13px;border-radius:99px;font-size:12.5px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:var(--trans);flex-shrink:0;
}
.chip-btn.add{background:var(--gBrand);color:#FFF;box-shadow:0 0 10px rgba(124,92,252,.3);}
.chip-btn.add:active{opacity:.8;}
.chip-btn.sent{background:rgba(124,92,252,.12);color:var(--violet);}
.round-btn{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:var(--trans);flex-shrink:0;
}
.round-btn:active{opacity:.7;}
.round-btn svg{width:18px;height:18px;}
.round-btn.violet{background:rgba(124,92,252,.15);color:var(--violet);}
.round-btn.rose{background:rgba(255,77,128,.12);color:var(--rose);}
.round-btn.mint{background:rgba(0,229,160,.12);color:var(--mint);}

/* ════════════════════════════════════════════
   SECTION LABEL
════════════════════════════════════════════ */
.section-label{
  font-size:10.5px;font-weight:800;letter-spacing:1px;
  color:var(--tx-s);padding:14px 16px 6px;
}

/* ════════════════════════════════════════════
   ONLINE STRIP
════════════════════════════════════════════ */
.online-strip{
  display:flex;gap:12px;padding:10px 14px 4px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;
}
.online-strip::-webkit-scrollbar{display:none;}
.online-strip-header{
  font-size:10px;font-weight:800;letter-spacing:1px;
  color:var(--tx-s);padding:10px 16px 2px;
}
.strip-item{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;flex-shrink:0;
}
.strip-avi{position:relative;}
.strip-avi .avi{width:46px;height:46px;font-size:16px;}
.strip-dot{
  position:absolute;bottom:0;right:0;
  width:12px;height:12px;border-radius:50%;
  background:var(--live);border:2px solid var(--bg);
  box-shadow:0 0 6px rgba(46,255,154,.5);
}
.strip-name{font-size:10.5px;color:var(--tx);font-weight:600;max-width:50px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ════════════════════════════════════════════
   PROFILE TAB
════════════════════════════════════════════ */
.profile-header{
  background:linear-gradient(135deg,#130F40,#080916);
  padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;
}
body.light .profile-header{background:linear-gradient(135deg,#6040E8,#8560FF);}
.profile-avi-wrap{position:relative;}
.profile-avi{
  width:76px;height:76px;border-radius:50%;border:3px solid;
  border-image:var(--gBrand) 1;outline:3px solid;
  object-fit:cover;background:var(--d4);
  box-shadow:0 0 22px rgba(124,92,252,.4);
  border-radius:50%;
}
.profile-avi-ring{
  width:80px;height:80px;border-radius:50%;
  background:var(--gBrand);padding:3px;
  box-shadow:0 0 22px rgba(124,92,252,.4);
  cursor:pointer;
}
.profile-avi-ring img,.profile-avi-ring .avi{
  width:100%;height:100%;border-radius:50%;
  border:2px solid var(--d1);object-fit:cover;
}
.edit-badge{
  position:absolute;bottom:0;right:0;
  width:24px;height:24px;border-radius:50%;background:var(--violet);
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);cursor:pointer;
}
.edit-badge svg{width:12px;height:12px;fill:#FFF;}
.profile-name{font-size:21px;font-weight:800;color:#FFF;}
.profile-username{font-size:13.5px;font-weight:600;
  background:var(--gBrand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.profile-bio{font-size:13px;color:rgba(255,255,255,.7);text-align:center;}
.stat-pills{display:flex;gap:12px;}
.stat-pill{
  padding:8px 16px;border-radius:20px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.stat-val{font-size:15px;font-weight:800;color:#FFF;}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.65);font-weight:500;}
.pref-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pref-row{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-bottom:1px solid var(--divider);cursor:pointer;
  transition:background .15s;
}
.pref-row:active{background:var(--fill);}
.pref-icon-wrap{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pref-icon-wrap svg{width:18px;height:18px;fill:#FFF;}
.pref-label{font-size:14.5px;font-weight:600;color:var(--tx);flex:1;}
.pref-sub{font-size:12px;color:var(--tx-s);margin-top:1px;}
.pref-label.danger{color:var(--rose);}
/* Toggle */
.toggle{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;}
.toggle input{position:absolute;opacity:0;width:0;height:0;}
.toggle-track{
  position:absolute;inset:0;border-radius:13px;
  background:rgba(120,120,168,.3);transition:background .2s;
}
.toggle input:checked + .toggle-track{background:var(--violet);}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;background:#FFF;
  transition:transform .2s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px);}
.version-badge{
  margin:16px 48px;padding:9px;
  border-radius:20px;border:1px solid rgba(124,92,252,.22);
  text-align:center;font-size:11px;font-weight:600;letter-spacing:.4px;
  background:var(--gBrand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ════════════════════════════════════════════
   CHAT SCREEN
════════════════════════════════════════════ */
.chat-screen .app-bar{background:linear-gradient(90deg,#111228,#080916);}
.chat-avi{width:36px;height:36px;font-size:14px;}
.chat-title-block{display:flex;flex-direction:column;}
.msg-list{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px;display:flex;flex-direction:column;gap:0;
}
.msg-list::-webkit-scrollbar{display:none;}

/* Bubbles */
.bubble-wrap{display:flex;flex-direction:column;margin-bottom:2px;}
.bubble-wrap.me{align-items:flex-end;}
.bubble-wrap.them{align-items:flex-start;}
.bubble{
  max-width:75%;border-radius:16px;overflow:hidden;
  position:relative;animation:fadeUp .25s ease-out;
}
.bubble-wrap.me .bubble{border-bottom-right-radius:5px;background:var(--sent-bg);}
.bubble-wrap.them .bubble{border-bottom-left-radius:5px;background:var(--recv-bg);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Forwarded tag */
.fwd-tag{
  padding:6px 12px 0;display:flex;align-items:center;gap:4px;
  font-size:10.5px;font-style:italic;
}
.bubble-wrap.me .fwd-tag{color:rgba(255,255,255,.55);}
.bubble-wrap.them .fwd-tag{color:var(--tx-s);}

/* Reply preview */
.reply-preview{
  margin:6px 6px 0;padding:8px 10px;border-radius:10px;
  border-left:3px solid var(--violet);
}
.bubble-wrap.me .reply-preview{background:rgba(0,0,0,.18);}
.bubble-wrap.them .reply-preview{background:var(--fill);}
.reply-from{font-size:11px;font-weight:700;color:var(--violet);}
.reply-txt{font-size:12px;color:var(--tx-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Bubble text */
.bubble-text{
  padding:10px 13px 4px;font-size:15.5px;line-height:1.45;
  color:var(--tx);word-break:break-word;
}
.bubble-wrap.me .bubble-text{color:#F0F0FF;}
.bubble-wrap.them .bubble-text{color:var(--tx);}

/* Bubble image */
.bubble-img{width:220px;height:185px;object-fit:cover;display:block;}
.bubble-img-auto{
  width:220px;border-radius:12px;cursor:pointer;
  position:relative;overflow:hidden;display:block;
}
.bubble-img-auto img{width:100%;height:180px;object-fit:cover;display:block;}
.auto-badge{
  position:absolute;bottom:5px;left:5px;
  background:rgba(0,0,0,.45);padding:2px 7px;border-radius:6px;
  font-size:9.5px;color:rgba(255,255,255,.8);font-weight:600;
  display:flex;align-items:center;gap:3px;
}

/* Link embed */
.link-embed{
  margin:8px 10px 4px;border-radius:12px;overflow:hidden;
  border:1px solid rgba(124,92,252,.3);cursor:pointer;
  transition:opacity .15s;
}
.link-embed:active{opacity:.8;}
.link-header{
  background:linear-gradient(135deg,rgba(124,92,252,.25),rgba(0,212,255,.1));
  padding:7px 10px;display:flex;align-items:center;gap:6px;
}
.link-domain{font-size:11px;color:var(--violet);font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-url{padding:6px 10px 8px;font-size:12px;color:var(--tx-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-open{
  padding:6px 10px 10px;font-size:12px;font-weight:700;
  background:var(--gBrand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Bubble footer */
.bubble-footer{
  padding:0 10px 7px;display:flex;align-items:center;
  gap:4px;justify-content:flex-end;
}
.bubble-time{font-size:10.5px;color:var(--tx-s);}
.bubble-wrap.me .bubble-time{color:rgba(255,255,255,.55);}
.tick-icon{font-size:13px;color:var(--tx-s);}
.tick-icon.read{color:var(--cyan);}

/* Reactions */
.reactions{
  display:flex;flex-wrap:wrap;gap:4px;padding:2px 8px 6px;
}
.react-chip{
  background:var(--fill);border-radius:99px;padding:3px 7px;
  font-size:12px;display:flex;align-items:center;gap:3px;cursor:pointer;
  border:1px solid var(--divider);
}
.react-chip span{font-size:10px;color:var(--tx-s);font-weight:700;}

/* Date chip */
.date-chip{
  text-align:center;margin:8px 0;font-size:11px;color:var(--tx-s);
  display:flex;align-items:center;gap:8px;
}
.date-chip::before,.date-chip::after{content:'';flex:1;height:1px;background:var(--divider);}

/* Pin banner */
.pin-banner{
  background:var(--fill);padding:8px 14px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--divider);flex-shrink:0;cursor:pointer;
}
.pin-banner svg{width:14px;height:14px;fill:var(--violet);flex-shrink:0;}
.pin-text{font-size:12.5px;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pin-close{color:var(--tx-s);font-size:18px;cursor:pointer;line-height:1;}

/* Typing indicator */
.typing-bubble{
  background:var(--recv-bg);border-radius:16px;border-bottom-left-radius:5px;
  padding:10px 14px;display:flex;align-items:center;gap:4px;
  align-self:flex-start;margin-bottom:4px;animation:fadeUp .25s ease-out;
}

/* Search bar in chat */
.chat-search{
  padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--divider);
  display:none;flex-shrink:0;
}
.chat-search.visible{display:flex;align-items:center;gap:8px;}
.chat-search-inner{
  flex:1;background:var(--fill);border-radius:10px;
  display:flex;align-items:center;padding:0 10px;height:38px;
}
.chat-search-inner input{flex:1;color:var(--tx);font-size:14px;}
.chat-search-inner input::placeholder{color:var(--tx-s);}

/* Reply bar */
.reply-bar{
  display:none;padding:8px 12px;background:var(--surf);
  border-top:1px solid var(--divider);
  flex-direction:row;align-items:center;gap:10px;flex-shrink:0;
}
.reply-bar.visible{display:flex;}
.reply-bar-inner{
  flex:1;border-left:3px solid var(--violet);
  padding-left:10px;overflow:hidden;
}
.reply-bar-from{font-size:11px;font-weight:700;color:var(--violet);}
.reply-bar-txt{font-size:12px;color:var(--tx-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-cancel{color:var(--tx-s);font-size:22px;cursor:pointer;line-height:1;}

/* Message input */
.msg-input-wrap{
  background:var(--surf);padding:8px 10px;display:flex;align-items:flex-end;
  gap:7px;border-top:1px solid var(--divider);flex-shrink:0;
  padding-bottom:calc(8px + env(safe-area-inset-bottom,0));
}
.input-btn{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;
  background:var(--fill);border:1px solid var(--divider);
  transition:var(--trans);
}
.input-btn:active{opacity:.7;}
.input-btn svg,.input-btn .emoji-icon{color:var(--tx-s);font-size:18px;width:20px;height:20px;}
.msg-field-wrap{
  flex:1;background:var(--fill);border-radius:22px;
  display:flex;align-items:flex-end;padding:8px 14px;
  border:1.5px solid transparent;transition:border-color .2s;min-height:42px;
}
.msg-field-wrap:focus-within{border-color:rgba(124,92,252,.4);}
.msg-field{
  flex:1;background:none;color:var(--tx);font-size:15px;line-height:1.45;
  max-height:120px;overflow-y:auto;resize:none;
  caret-color:var(--violet);
}
.msg-field::placeholder{color:var(--tx-s);}
.send-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--gBrand);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 0 14px rgba(124,92,252,.4);
  transition:transform .15s,opacity .15s;
}
.send-btn:active{transform:scale(.9);}
.send-btn svg{width:20px;height:20px;fill:#FFF;}

/* ════════════════════════════════════════════
   LOGIN SCREEN
════════════════════════════════════════════ */
.login-screen{
  background:var(--d0);overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;
}
.nebula-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 30%,rgba(124,92,252,.18) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 70%,rgba(0,212,255,.12) 0%,transparent 50%);
  animation:nebulaPulse 8s ease-in-out infinite alternate;
}
@keyframes nebulaPulse{
  from{opacity:.7;transform:scale(1);}
  to{opacity:1;transform:scale(1.05);}
}
.login-inner{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 26px;gap:0;
}
.login-logo{margin-bottom:16px;animation:popIn .6s .1s cubic-bezier(.34,1.56,.64,1) both;}
.gax-logo-lg{
  width:70px;height:70px;border-radius:20px;background:var(--gBrand);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:#FFF;letter-spacing:-1px;
  box-shadow:0 0 30px rgba(124,92,252,.5);
}
.login-brand{font-size:23px;font-weight:900;letter-spacing:5px;color:#FFF;margin-bottom:6px;
  animation:popIn .6s .15s cubic-bezier(.34,1.56,.64,1) both;}
.login-hint{font-size:12.5px;color:var(--tx2);letter-spacing:.2px;margin-bottom:40px;
  animation:fadeUp .6s .2s ease both;}
.glass-card{
  width:100%;background:rgba(255,255,255,.04);border-radius:20px;
  border:1px solid rgba(255,255,255,.08);padding:22px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  animation:popIn .6s .25s cubic-bezier(.34,1.56,.64,1) both;
}
.grad-bar{height:3px;background:var(--gBrand);border-radius:99px;margin-bottom:16px;}
.card-title{font-size:21px;font-weight:800;color:var(--tx1);margin-bottom:3px;}
.card-sub{font-size:12.5px;color:var(--tx2);margin-bottom:22px;}
.gax-field{
  background:rgba(255,255,255,.06);border-radius:14px;
  display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;
  border:1.5px solid transparent;transition:border-color .2s;margin-bottom:12px;
}
.gax-field:focus-within{border-color:rgba(124,92,252,.5);}
.gax-field input,.gax-field textarea{
  flex:1;background:none;color:#F0F0FF;font-size:14px;
  caret-color:var(--violet);height:100%;
}
.gax-field input::placeholder,.gax-field textarea::placeholder{color:var(--tx2);}
.gax-field-icon{color:var(--tx2);display:flex;flex-shrink:0;}
.gax-field-icon svg{width:18px;height:18px;}
.err-box{
  background:rgba(255,77,128,.1);border:1px solid rgba(255,77,128,.3);
  border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;
  margin-bottom:12px;
}
.err-box span{font-size:12px;color:var(--rose);flex:1;}
.gax-btn{
  width:100%;height:52px;border-radius:14px;cursor:pointer;
  background:var(--gBrand);color:#FFF;font-size:15px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 20px rgba(124,92,252,.35);
  transition:opacity .15s,transform .15s;
}
.gax-btn:active{opacity:.85;transform:scale(.98);}
.gax-btn:disabled{opacity:.5;pointer-events:none;}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* ════════════════════════════════════════════
   PROFILE SETUP SCREEN
════════════════════════════════════════════ */
.setup-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;}
.setup-field{
  background:var(--fill);border-radius:14px;
  display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;
  border:1.5px solid transparent;transition:border-color .2s;margin-bottom:12px;
}
.setup-field:focus-within{border-color:rgba(124,92,252,.5);}
.setup-field input,.setup-field textarea{
  flex:1;background:none;color:var(--tx);font-size:14px;
  caret-color:var(--violet);height:100%;
}
.setup-field input::placeholder,.setup-field textarea::placeholder{color:var(--tx-s);}
.setup-field svg{width:18px;height:18px;fill:var(--tx-s);flex-shrink:0;}

/* ════════════════════════════════════════════
   BOTTOM SHEETS & MODALS
════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:none;align-items:flex-end;
  animation:fadeIn .2s ease;
}
.overlay.visible{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--d4);border-radius:24px 24px 0 0;
  padding:0 0 env(safe-area-inset-bottom,12px);
  animation:slideUp .28s cubic-bezier(.4,0,.2,1);
  max-height:80vh;overflow:hidden;display:flex;flex-direction:column;
}
body.light .sheet{background:#FFF;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--tx3);margin:12px auto 16px;}
.sheet-title{text-align:center;font-size:14px;font-weight:700;color:var(--tx);margin-bottom:12px;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px 12px;}
.sheet-action{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:10px;cursor:pointer;transition:background .15s;
}
.sheet-action:active{background:var(--fill);}
.sheet-action-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sheet-action-icon svg{width:17px;height:17px;fill:#FFF;}
.sheet-action-label{font-size:14px;font-weight:500;color:var(--tx);}

/* Alert dialog */
.alert-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:none;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn .2s ease;
}
.alert-overlay.visible{display:flex;}
.alert-box{
  width:100%;max-width:320px;background:var(--d3);border-radius:20px;
  border:1px solid rgba(124,92,252,.2);padding:24px;
  box-shadow:0 0 40px rgba(124,92,252,.2);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
body.light .alert-box{background:#FFF;}
.alert-title{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:8px;}
.alert-body{font-size:13.5px;color:var(--tx-s);line-height:1.5;margin-bottom:20px;}
.alert-btns{display:flex;gap:10px;}
.alert-btn{
  flex:1;height:44px;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.alert-btn:active{opacity:.7;}
.alert-btn.cancel{background:var(--fill);color:var(--tx);}
.alert-btn.confirm{background:var(--gBrand);color:#FFF;}
.alert-btn.danger{background:var(--rose);color:#FFF;}

/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;padding:4px;}
.emoji-item{
  height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;background:var(--d5);transition:background .15s;
}
body.light .emoji-item{background:var(--l2);}
.emoji-item:active{background:var(--violet);}

/* Spinner */
.spinner{
  width:22px;height:22px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#FFF;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Username copy chip */
.username-chip{
  display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:16px;
  background:var(--gBrand);cursor:pointer;box-shadow:0 0 14px rgba(124,92,252,.3);
  transition:opacity .15s;
}
.username-chip:active{opacity:.8;}
.username-chip span{color:#FFF;font-size:15px;font-weight:800;letter-spacing:.3px;}

/* Alert auto-snackbar */
.snackbar{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#222;color:#FFF;padding:10px 18px;border-radius:20px;
  font-size:13px;font-weight:600;white-space:nowrap;z-index:999;
  opacity:0;transition:opacity .25s;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.snackbar.show{opacity:1;}

/* Profile dialog */
.profile-dialog-avi{
  width:88px;height:88px;border-radius:50%;background:var(--gBrand);
  padding:3px;box-shadow:0 0 22px rgba(124,92,252,.4);margin:0 auto 14px;
}
.profile-dialog-avi img,.profile-dialog-avi .avi{
  width:100%;height:100%;border-radius:50%;border:2px solid var(--d3);
  object-fit:cover;font-size:26px;display:flex;align-items:center;justify-content:center;color:var(--violet);
}
.profile-dialog-name{font-size:20px;font-weight:800;color:var(--tx);text-align:center;}
.profile-dialog-user{font-size:13.5px;font-weight:600;text-align:center;
  background:var(--gBrand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status-pill{
  display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;
  margin:8px auto;width:fit-content;
}
.status-dot{width:8px;height:8px;border-radius:50%;}

/* Send msg btn in dialog */
.send-msg-btn{
  width:100%;height:46px;border-radius:13px;margin-top:16px;
  background:var(--gBrand);color:#FFF;font-size:14px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 14px rgba(124,92,252,.3);
}
.send-msg-btn:active{opacity:.8;}

/* ════════════════════════════════════════════
   FORWARD SHEET ITEMS
════════════════════════════════════════════ */
.fwd-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:12px;cursor:pointer;transition:background .15s;
}
.fwd-item:active{background:var(--fill);}
.fwd-item-name{flex:1;font-size:14.5px;font-weight:600;color:var(--tx);}
.fwd-send-btn{
  padding:6px 13px;border-radius:99px;
  background:var(--mint);color:#080916;font-size:12px;font-weight:700;
  cursor:pointer;
}

/* ════════════════════════════════════════════
   MISC UTILITIES
════════════════════════════════════════════ */
.flex{display:flex;}.flex-col{flex-direction:column;}
.flex-1{flex:1;}.gap-8{gap:8px;}.items-center{align-items:center;}
.hidden{display:none!important;}
.text-violet{color:var(--violet);}
.fw800{font-weight:800;}

/* ════════════════════════════════════════════
   AUTO CONTENT — inline URL detection
════════════════════════════════════════════ */
.auto-link{color:var(--cyan);text-decoration:underline;word-break:break-all;cursor:pointer;}
</style>

<div class="snackbar" id="snackbar"></div>

      <button class="alert-btn confirm" id="alertConfirm"></button>

</div>

</div>

<!-- APP ROOT -->
<div id="app">

  <!-- ══ LOGIN SCREEN ══ -->
  <div class="screen login-screen" id="screenLogin">
    <div class="nebula-bg"></div>
    <div class="login-inner">
      <div class="login-logo">
        <div class="gax-logo-lg">G</div>
      </div>
      <div class="login-brand">GAX CHATS</div>
      <div class="login-hint">Sign in · account is auto-created</div>
      <div class="glass-card">
        <div class="grad-bar"></div>
        <div class="card-title">Welcome to GAX</div>
        <div class="card-sub">Connect with people around you</div>
        <div class="gax-field">
          <div class="gax-field-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
          <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email"/>
        </div>
        <div class="gax-field" style="margin-bottom:0">
          <div class="gax-field-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>

            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </div>
        </div>
        <div class="err-box hidden" id="loginErr">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#FF4D80"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>

      </div>
    </div>
  </div>

  <!-- ══ PROFILE SETUP SCREEN ══ -->
  <div class="screen hidden" id="screenSetup">
    <div class="app-bar">
      <div class="gax-logo" style="width:28px;height:28px;font-size:12px;margin-left:4px;">G</div>
      <div class="bar-title">Create Profile</div>
    </div>
    <div class="setup-body">
      <div style="text-align:center;margin:8px 0 32px">
        <div class="gax-logo-lg" style="width:64px;height:64px;font-size:24px;margin:0 auto 10px">G</div>
        <div style="font-size:13px;color:var(--tx-s)">Set up your GAX identity</div>
      </div>
      <div class="setup-field">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <input type="text" id="setupName" placeholder="Full Name *" autocomplete="name"/>
      </div>
      <div class="setup-field">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>

      <div class="setup-field" style="height:70px;padding:10px 14px;align-items:flex-start">

        <textarea id="setupBio" placeholder="Bio (optional)" rows="2" style="flex:1;background:none;color:var(--tx);font-size:14px;resize:none;caret-color:var(--violet);padding-top:2px"></textarea>

  <!-- ══ MAIN SCREEN ══ -->

function showScreen(id){

}

// ════════════════════════════════════════════════════════
//  AUTH GATE
// ════════════════════════════════════════════════════════
auth.onAuthStateChanged(user => {
  if(!user){ myId=null; myData=null; showScreen('screenLogin'); return; }
  myId = user.uid;
  // Set online
  const statusRef = db.ref('users/'+myId+'/status');
  statusRef.set('online');
  statusRef.onDisconnect().set('offline');
  db.ref('users/'+myId+'/lastSeen').onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);

  db.ref('users/'+myId).once('value', snap => {
    const d = snap.val();
    if(!d || !d.name || !d.username){
      showScreen('screenSetup');
    } else {
      myData = d;
      showScreen('screenMain');
      initMain();
    }
  });
});

    } catch(e2){
      showLoginErr('Invalid credentials or weak password (min 6 chars)');
      btn.disabled = false;
      btn.innerHTML = '<span>Continue</span><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>';

}

// ════════════════════════════════════════════════════════
//  CHATS TAB — per-chatId streams, sorted by lastTs
// ════════════════════════════════════════════════════════
let chatsFriendIds = [];
let chatsMetaMap = {}; // chatId → {lastTs, unread, lastMsg, lastMsgType, lastMsgSender}

function renderChatsTab(){
  // Listen for friends list
  db.ref('users/'+myId+'/friends').on('value', snap=>{
    chatsFriendIds = snap.val() ? Object.keys(snap.val()) : [];
    // Subscribe to each chat meta
    chatsFriendIds.forEach(fid=>{
      if(chatsListeners[fid]) return; // already listening
      const cid = [myId,fid].sort().join('_');
      const off = db.ref('chats/'+cid).on('value', csnap=>{
        const d = csnap.val() || {};
        const unreadMap = d.unread || {};
        chatsMetaMap[fid] = {
          lastTs: d.lastTs||0, lastMsg: d.lastMsg||'', lastMsgType: d.lastMsgType||'text',
          lastMsgSender: d.lastMsgSender||'', unread: unreadMap[myId]||0,
        };
        buildChatsList();
      });
      chatsListeners[fid] = ()=> db.ref('chats/'+cid).off('value', off);
    });
    // Remove stale listeners
    Object.keys(chatsListeners).forEach(fid=>{
      if(!chatsFriendIds.includes(fid)){ chatsListeners[fid](); delete chatsListeners[fid]; delete chatsMetaMap[fid]; }
    });
    buildChatsList();
  });
}

function buildChatsList(){
  const sorted = [...chatsFriendIds].sort((a,b)=>((chatsMetaMap[b]||{}).lastTs||0)-((chatsMetaMap[a]||{}).lastTs||0));
  const el = document.getElementById('chatsList');
  if(sorted.length===0){
    el.innerHTML = emptyStateHTML('💬','No Conversations','Find friends and start chatting');
    return;
  }
  // Build rows — fetch user data lazily
  el.innerHTML = sorted.map(fid=>`<div id="convRow_${fid}" class="conv-row" onclick="openChat('${fid}')"></div>`).join('');
  sorted.forEach((fid,i)=> loadConvRow(fid, i));
}

const userCache = {};
function getUser(uid, cb){
  if(userCache[uid]){ cb(userCache[uid]); return; }
  db.ref('users/'+uid).once('value', snap=>{ userCache[uid]=snap.val()||{}; cb(userCache[uid]); });
}

function loadConvRow(fid, idx){
  const el = document.getElementById('convRow_'+fid);
  if(!el) return;
  // Subscribe live for typing + status
  db.ref('users/'+fid).on('value', snap=>{
    const u = snap.val()||{};
    userCache[fid] = u;
    const meta = chatsMetaMap[fid]||{};
    const unread = meta.unread||0;
    const online = u.status==='online';
    el.className = 'conv-row'+(unread>0?' unread':'');
    el.onclick = ()=> openChat(fid);
    // Typing
    const cid = [myId,fid].sort().join('_');
    db.ref('typing/'+cid+'/'+fid).on('value', tsnap=>{
      const typing = tsnap.val()===true;
      renderConvRowInner(el, u, meta, unread, online, typing, fid);
    });
  });
}

function renderConvRowInner(el, u, meta, unread, online, typing, fid){
  const name = u.name||'?';
  const pfp  = u.pfp||'';
  const isMe = meta.lastMsgSender===myId;
  let preview = '';
  if(typing){ preview='<div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-text">typing…</span>'; }
  else {
    let txt = meta.lastMsg||'Tap to start chatting';
    preview = `<span class="conv-preview${unread>0?' bold':''}">${escHtml(txt)}</span>`;
  }
  const tick = isMe && !typing ? `<span class="tick${meta.lastMsgRead?' read':''}">✓✓</span>` : '';
  const badge = unread>0 ? `<div class="unread-badge">${unread>99?'99+':unread}</div>` : '';
  const ts = meta.lastTs ? fmtTime(meta.lastTs) : '';
  el.innerHTML = `
    <div class="avi-wrap">
      <div class="avi">${pfp?`<img src="${escHtml(pfp)}" onerror="this.style.display='none'" loading="lazy"/>`:''}${initials(name)}</div>
      <div class="online-dot${online?'':' offline'}"></div>
    </div>
    <div class="conv-info">
      <div class="conv-top">
        <div class="conv-name${unread>0?' bold':''}">${escHtml(name)}</div>
        <div class="conv-time${unread>0?' unread-time':''}">${ts}</div>
      </div>
      <div class="conv-bottom">
        ${tick}
        <div style="flex:1;display:flex;align-items:center;gap:4px;overflow:hidden">${preview}</div>
        ${badge}
      </div>
    </div>`;
}

function copyUsername(){
  const u = myData ? myData.username : '';
  if(u) { try{ navigator.clipboard.writeText('@'+u); }catch(e){} snack('Username copied!'); }
}

function onFindInput(v){
  document.getElementById('findClear').classList.toggle('hidden', !v);
  document.getElementById('findSearchIcon').classList.toggle('active', !!v);
  if(findTimeout) clearTimeout(findTimeout);
  if(!v){ showFindEmpty(); return; }
  findTimeout = setTimeout(()=> doFind(v.toLowerCase()), 350);
}
function clearFind(){ document.getElementById('findInput').value=''; onFindInput(''); }

function doFind(q){
  const resultsEl = document.getElementById('findResults');
  resultsEl.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>`;
  // Get friends + my reqs first
  Promise.all([
    db.ref('users/'+myId+'/friends').once('value'),
    db.ref('users/'+myId+'/req').once('value'),
    db.ref('users').orderByChild('username').startAt(q).endAt(q+'\uf8ff').once('value'),
  ]).then(([friendSnap, reqSnap, usersSnap])=>{
    const friendIds = new Set(Object.keys(friendSnap.val()||{}));
    const sentReqs  = new Set(Object.keys(reqSnap.val()||{}));
    const list = [];
    (usersSnap.val()||{}) && Object.values(usersSnap.val()||{}).forEach(u=>{
      if(!u||!u.uid) return;
      if(u.uid===myId) return;
      if(friendIds.has(u.uid)) return;
      list.push(u);
    });
    if(list.length===0){
      resultsEl.innerHTML = emptyStateHTML('🔍','No Results','Try a different username');
      return;
    }
    resultsEl.innerHTML = list.map(u=>{
      const sent = sentReqs.has(u.uid);
      return `<div class="contact-row">
        <div class="avi" style="width:46px;height:46px;font-size:16px">${u.pfp?`<img src="${escHtml(u.pfp)}" loading="lazy"/>`:''}${initials(u.name||'?')}</div>
        <div class="contact-info">
          <div class="contact-name">${escHtml(u.name||'')}</div>
          <div class="contact-user">@${escHtml(u.username||'')}</div>
          ${u.bio?`<div class="contact-bio">${escHtml(u.bio)}</div>`:''}
        </div>
        ${sent
          ? `<div class="chip-btn sent">✓ Sent</div>`
          : `<div class="chip-btn add" onclick="sendReq('${u.uid}',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Add</div>`
        }
      </div>`;
    }).join('');
  });
}

function sendReq(uid, btn){
  db.ref('users/'+uid+'/req/'+myId).set(true);
  btn.outerHTML = `<div class="chip-btn sent">✓ Sent</div>`;
}

function renderSocialTab(){
  const el = document.getElementById('socialList');
  el.innerHTML = '';
  // Requests
  db.ref('users/'+myId+'/req').on('value', snap=>{
    buildSocialList();
  });
  db.ref('users/'+myId+'/friends').on('value', snap=>{
    buildSocialList();
  });
}

let socialFilter = '';
function buildSocialList(){
  Promise.all([
    db.ref('users/'+myId+'/req').once('value'),
    db.ref('users/'+myId+'/friends').once('value'),
  ]).then(([reqSnap, friendSnap])=>{
    const reqIds    = Object.keys(reqSnap.val()||{});
    const friendIds = Object.keys(friendSnap.val()||{});
    const el = document.getElementById('socialList');
    let html = '';

    // Requests section
    if(reqIds.length>0){
      html += `<div class="section-label">REQUESTS · ${reqIds.length}</div>`;
      html += reqIds.map(uid=>`<div id="req_${uid}" class="contact-row"></div>`).join('');
    }

    // Friends section
    html += `<div class="section-label">FRIENDS</div>`;
    html += `<div style="padding:4px 14px 8px">
      <div class="search-bar" style="height:42px">
        <div class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <input type="text" placeholder="Search friends…" oninput="socialFilter=this.value.toLowerCase();buildSocialList()" style="flex:1;background:none;color:var(--tx);font-size:14px"/>
      </div>
    </div>`;

    // Online strip
    const onlineFriends = friendIds.filter(fid=> (userCache[fid]||{}).status==='online');
    if(onlineFriends.length>0){
      html += `<div class="online-strip-header">ONLINE NOW</div>`;
      html += `<div class="online-strip">${onlineFriends.map(fid=>{
        const u = userCache[fid]||{};
        return `<div class="strip-item" onclick="openChat('${fid}')">
          <div class="strip-avi">
            <div class="avi" style="width:46px;height:46px;font-size:16px">${u.pfp?`<img src="${escHtml(u.pfp)}" loading="lazy"/>`:''}${initials(u.name||'?')}</div>
            <div class="strip-dot"></div>
          </div>
          <div class="strip-name">${escHtml(u.name||'')}</div>
        </div>`;
      }).join('')}</div>`;
    }

    if(friendIds.length===0){
      html += emptyStateHTML('👥','No Friends Yet','Start adding people from Find tab');
    } else {
      const filtered = friendIds.filter(fid=>{
        if(!socialFilter) return true;
        return (userCache[fid]||{}).name?.toLowerCase().includes(socialFilter);
      });
      html += filtered.map(fid=>`<div id="friend_${fid}" class="contact-row"></div>`).join('');
    }

    el.innerHTML = html;

    // Load req rows
    reqIds.forEach(uid=>{
      getUser(uid, u=>{
        const el2 = document.getElementById('req_'+uid);
        if(!el2) return;
        el2.innerHTML = `
          <div class="avi" style="width:46px;height:46px;font-size:16px">${u.pfp?`<img src="${escHtml(u.pfp)}" loading="lazy"/>`:''}${initials(u.name||'?')}</div>
          <div class="contact-info"><div class="contact-name">${escHtml(u.name||'')}</div><div class="contact-user">@${escHtml(u.username||'')}</div></div>
          <div style="display:flex;gap:8px">
            <div class="round-btn rose" onclick="rejectReq('${uid}')"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
            <div class="round-btn mint" onclick="acceptReq('${uid}')"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
          </div>`;
      });
    });

    // Load friend rows
    friendIds.filter(fid=> !socialFilter || (userCache[fid]||{}).name?.toLowerCase().includes(socialFilter))
    .forEach(fid=>{
      getUser(fid, u=>{
        const el2 = document.getElementById('friend_'+fid);
        if(!el2) return;
        el2.onclick = ()=> openChat(fid);
        el2.innerHTML = `
          <div class="avi-wrap">
            <div class="avi" style="width:46px;height:46px;font-size:16px">${u.pfp?`<img src="${escHtml(u.pfp)}" loading="lazy"/>`:''}${initials(u.name||'?')}</div>
            <div class="online-dot${u.status==='online'?'':' offline'}"></div>
          </div>
          <div class="contact-info"><div class="contact-name">${escHtml(u.name||'')}</div><div class="contact-user">@${escHtml(u.username||'')}</div></div>
          <div style="display:flex;gap:8px">
            <div class="round-btn violet" onclick="openChat('${fid}');event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
            <div class="round-btn rose" onclick="confirmUnfriend('${fid}','${escHtml(u.name||'')}');event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M14 8c0-2.21-1.79-4-4-4S6 5.79 6 8s1.79 4 4 4 4-1.79 4-4zm3 2v2h6v-2h-6zm-3 4H7c-2.21 0-4 1.79-4 4v2h14v-2c0-2.21-1.79-4-4-4z"/></svg></div>
          </div>`;
      });
    });
  });
}
function acceptReq(uid){
  db.ref('users/'+myId+'/friends/'+uid).set(true);
  db.ref('users/'+uid+'/friends/'+myId).set(true);
  db.ref('users/'+myId+'/req/'+uid).remove();
}
function rejectReq(uid){ db.ref('users/'+myId+'/req/'+uid).remove(); }
function confirmUnfriend(uid, name){
  showAlert('Unfriend','Remove '+name+' from friends?','Remove','danger',()=>{
    db.ref('users/'+myId+'/friends/'+uid).remove();
    db.ref('users/'+uid+'/friends/'+myId).remove();
  });
}

function openChat(fid){
  getUser(fid, u=>{
    chatTarget = u;
    chatId = [myId, fid].sort().join('_');
    replyMsg = null; pinKey=null; pinMsg=null; chatSearchQ='';

    // Setup UI
    document.getElementById('chatName').textContent = u.name||'?';
    const aviEl = document.getElementById('chatAvi');
    aviEl.innerHTML = u.pfp ? `<img src="${escHtml(u.pfp)}" loading="lazy"/>` : '';
    aviEl.textContent = u.pfp ? '' : initials(u.name||'?');

    document.getElementById('replyBar').classList.remove('visible');
    document.getElementById('chatSearchBar').classList.remove('visible');
    document.getElementById('chatSearchInput').value='';
    document.getElementById('msgField').value='';
    document.getElementById('pinBanner').classList.add('hidden');

    showScreen('screenChat');

    // Status stream
    if(chatStatusOff) chatStatusOff();
    chatStatusOff = db.ref('users/'+fid).on('value', snap=>{
      const d2 = snap.val()||{};
      userCache[fid] = d2;
      const online = d2.status==='online';
      let sub='';
      if(online){ sub='● online'; }
      else if(d2.lastSeen){
        const diff = Date.now()-d2.lastSeen;
        const m=Math.floor(diff/60000);
        if(m<1) sub='last seen just now';
        else if(m<60) sub='last seen '+m+'m ago';
        else if(m<1440) sub='last seen '+Math.floor(m/60)+'h ago';
        else sub='last seen '+Math.floor(m/1440)+'d ago';
      } else { sub='offline'; }
      document.getElementById('chatStatus').textContent=sub;
      document.getElementById('chatStatus').style.color=online?'rgba(46,255,154,.9)':'rgba(255,255,255,.5)';
    }, ()=>{});

    // Typing stream
    if(chatTypingOff){ db.ref('typing/'+chatId+'/'+fid).off('value',chatTypingOff); chatTypingOff=null; }
    chatTypingOff = db.ref('typing/'+chatId+'/'+fid).on('value', snap=>{
      const typing = snap.val()===true;
      document.querySelector('.typing-bubble')?.remove();
      if(typing){
        const tb=document.createElement('div');
        tb.className='typing-bubble';
        tb.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
        document.getElementById('msgList').appendChild(tb);
        scrollToBottom();
      }
    }, ()=>{});

    // Mark user online + disconnect
    db.ref('users/'+myId+'/status').set('online');
    db.ref('typing/'+chatId+'/'+myId).onDisconnect().set(false);

    // Mark read + load pin
    markRead();
    loadPin();
    initChatMeta();

    // Messages stream
    if(chatMsgsOff){ db.ref('messages/'+chatId).off('value',chatMsgsOff); chatMsgsOff=null; }
    let lastCount=0;
    chatMsgsOff = db.ref('messages/'+chatId).on('value', snap=>{
      const raw = snap.val()||{};
      let msgs = Object.entries(raw)
        .filter(([,v])=> v&&typeof v==='object')
        .map(([k,v])=>({_key:k,...v}))
        .sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
      if(chatSearchQ) msgs=msgs.filter(m=>(m.text||'').toLowerCase().includes(chatSearchQ));
      renderMessages(msgs);
      if(msgs.length!==lastCount){ lastCount=msgs.length; scrollToBottom(); }
    }, ()=>{});
  });
}

function closeChat(){
  if(chatId){
    db.ref('typing/'+chatId+'/'+myId).set(false);
    db.ref('users/'+myId+'/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);
    db.ref('users/'+myId+'/status').set('offline');
  }
  if(chatMsgsOff){ db.ref('messages/'+chatId).off('value',chatMsgsOff); chatMsgsOff=null; }
  if(chatTypingOff){ db.ref('typing/'+chatId+'/'+fid).off('value',chatTypingOff); chatTypingOff=null; }
  if(chatStatusOff){ db.ref('users/'+(chatTarget&&chatTarget.uid||'')).off('value',chatStatusOff); chatStatusOff=null; }
  chatTarget=null; chatId=null;
  showScreen('screenMain');
  // re-set online for main screen
  if(myId) db.ref('users/'+myId+'/status').set('online');
}

function markRead(){
  db.ref('messages/'+chatId).once('value', snap=>{
    const updates={};
    Object.entries(snap.val()||{}).forEach(([k,v])=>{
      if(v&&v.senderId!==myId&&v.read!==true) updates['messages/'+chatId+'/'+k+'/read']=true;
    });
    if(Object.keys(updates).length>0) db.ref().update(updates);
    db.ref('chats/'+chatId+'/unread/'+myId).set(0);
  });
}
function loadPin(){
  db.ref('chats/'+chatId+'/pinned').once('value', snap=>{
    if(!snap.val()) return;
    pinKey=snap.val();
    db.ref('messages/'+chatId+'/'+pinKey).once('value', ms=>{
      if(!ms.val()) return;
      pinMsg=ms.val();
      const banner=document.getElementById('pinBanner');
      document.getElementById('pinText').textContent=pinMsg.type==='image'?'📷 Image':(pinMsg.text||'');
      banner.classList.remove('hidden');
    });
  });
}
function unpin(){
  db.ref('chats/'+chatId+'/pinned').remove();
  document.getElementById('pinBanner').classList.add('hidden');
  pinKey=null; pinMsg=null;
}
function initChatMeta(){
  db.ref('chats/'+chatId+'/members').update({[myId]:true,[chatTarget.uid]:true});
}

// ════════════════════════════════════════════════════════
//  RENDER MESSAGES
// ════════════════════════════════════════════════════════
const URL_REGEX = /(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
const IMG_EXTS  = ['.jpg','.jpeg','.png','.gif','.webp','.bmp'];

function isImageUrl(url){ const l=url.toLowerCase().split('?')[0]; return IMG_EXTS.some(e=>l.endsWith(e)); }
function ensureScheme(url){ return url.startsWith('http') ? url : 'https://'+url; }

function autoContent(text, isMe){
  if(!URL_REGEX.test(text)){ URL_REGEX.lastIndex=0; return `<div class="bubble-text">${escHtml(text).replace(/\n/g,'<br>')}</div>`; }
  URL_REGEX.lastIndex=0;
  const parts=[];let last=0;
  let m;
  while((m=URL_REGEX.exec(text))!==null){
    if(m.index>last) parts.push({type:'text',content:text.slice(last,m.index)});
    const url=ensureScheme(m[0]);
    parts.push({type: isImageUrl(url)?'image':'link', content:url});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',content:text.slice(last)});
  if(parts.length===1&&parts[0].type==='image') return renderAutoImage(parts[0].content);
  if(parts.length===1&&parts[0].type==='link') return renderLinkEmbed(parts[0].content,isMe);
  return parts.map(p=>{
    if(p.type==='text') return p.content.trim()?`<div class="bubble-text">${escHtml(p.content).replace(/\n/g,'<br>')}</div>`:'';
    if(p.type==='image') return `<div style="padding:6px 0">${renderAutoImage(p.content)}</div>`;
    return `<div style="padding:4px 6px">${renderLinkEmbed(p.content,isMe)}</div>`;
  }).join('');
}

function renderAutoImage(url){
  return `<div class="bubble-img-auto" onclick="window.open('${escAttr(url)}','_blank')">
    <img src="${escAttr(url)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=padding:16px;text-align:center;color:var(--tx-s)>🖼️ Could not load image</div>'"/>

function renderMessages(msgs){
  const list=document.getElementById('msgList');
  let html='';
  let lastDay='';
  msgs.forEach((m,i)=>{
    const isMe=m.senderId===myId;
    const ts=m.timestamp?new Date(m.timestamp):new Date();
    const day=ts.toDateString();
    if(day!==lastDay){ lastDay=day; html+=`<div class="date-chip">${fmtDay(ts)}</div>`; }
    html+=renderBubble(m,isMe,ts);
  });
  list.innerHTML=html;
}

function renderBubble(m, isMe, ts){
  const cls=isMe?'me':'them';
  let body='';

  // Forwarded tag
  if(m.forwarded) body+=`<div class="fwd-tag">↪ Forwarded</div>`;

  // Reply preview
  if(m.replyTo&&typeof m.replyTo==='object'){
    const rf=m.replyTo.senderId===myId?'You':'Them';
    const rt=m.replyTo.type==='image'?'📷 Image':(m.replyTo.text||'');
    body+=`<div class="reply-preview"><div class="reply-from">${rf}</div><div class="reply-txt">${escHtml(rt)}</div></div>`;
  }

  // Content
  if(m.type==='image'){
    body+=`<img class="bubble-img" src="${escAttr(m.text||'')}" loading="lazy" onerror="this.style.display='none'"/>`;
  } else if(m.type==='link'){
    body+=renderLinkEmbed(m.text||'',isMe);
  } else {
    body+=autoContent(m.text||'',isMe);
  }

  // Reactions
  if(m.reactions&&typeof m.reactions==='object'){
    const grouped={};
    Object.values(m.reactions).forEach(e=>{ grouped[e]=(grouped[e]||0)+1; });
    if(Object.keys(grouped).length>0){
      body+=`<div class="reactions">${Object.entries(grouped).map(([e,c])=>`<div class="react-chip">${e}<span>${c>1?c:''}</span></div>`).join('')}</div>`;
    }
  }

  // Footer
  const timeStr=ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const read=m.read===true;
  body+=`<div class="bubble-footer">
    <span class="bubble-time">${timeStr}</span>
    ${isMe?`<span class="tick-icon${read?' read':''}">${read?'✓✓':'✓'}</span>`:''}
  </div>`;

  return `<div class="bubble-wrap ${cls}" data-key="${m._key||''}" oncontextmenu="msgLongPress(event,'${m._key||''}')" ondblclick="quickReact('${m._key||''}')">
    <div class="bubble">${body}</div>
  </div>`;
}

async function sendMsg(){
  const txt=document.getElementById('msgField').value.trim();
  if(!txt||!chatId) return;
  document.getElementById('msgField').value='';
  document.getElementById('msgField').style.height='auto';
  db.ref('typing/'+chatId+'/'+myId).set(false);
  if(typingTimer){clearTimeout(typingTimer);typingTimer=null;}

  const payload={senderId:myId,text:txt,timestamp:firebase.database.ServerValue.TIMESTAMP,read:false,type:'text'};
  if(replyMsg){ payload.replyTo={text:replyMsg.text,senderId:replyMsg.senderId,type:replyMsg.type||'text'}; cancelReply(); }
  await db.ref('messages/'+chatId).push(payload);
  saveChatMeta('text',txt);
}

function saveChatMeta(type,text){
  const raw=type==='image'?'📷 Image':type==='link'?'🔗 Link':text;
  const preview=raw.length>80?raw.slice(0,80)+'…':raw;
  const otherUid=chatTarget.uid;
  db.ref().update({
    ['chats/'+chatId+'/members/'+myId]:true,
    ['chats/'+chatId+'/members/'+otherUid]:true,
    ['chats/'+chatId+'/lastMsg']:preview,
    ['chats/'+chatId+'/lastMsgType']:type,
    ['chats/'+chatId+'/lastMsgSender']:myId,
    ['chats/'+chatId+'/lastTs']:firebase.database.ServerValue.TIMESTAMP,
    ['chats/'+chatId+'/updatedAt']:firebase.database.ServerValue.TIMESTAMP,
  });
  // Atomic unread increment
  db.ref('chats/'+chatId+'/unread/'+otherUid).transaction(cur=>(cur||0)+1);
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function emptyStateHTML(icon,title,sub){ return `<div class="empty-state"><div class="empty-icon-box">${icon}</div><div class="empty-title">${escHtml(title)}</div><div class="empty-sub">${escHtml(sub)}</div></div>`; }
function fmtTime(ts){
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const diff=(now-d)/86400000;
  if(diff<2) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtDay(d){
  const now=new Date();
  if(d.toDateString()===now.toDateString()) return 'Today';
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
}
