name: gax_chats
description: GAX Chats - Real-time messaging app
version: 8.0.0+8

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase — exact versions compatible with Flutter 3.22 + web + android
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  firebase_database: 11.1.4

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

flutter:
  uses-material-design: true

  # App logo asset — place logo.png in assets/ folder
  assets:
    - assets/logo.png
